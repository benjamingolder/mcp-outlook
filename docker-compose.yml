services:
  mcp-outlook:
    image: ghcr.io/benjamingolder/mcp-outlook:latest
    pull_policy: always
    container_name: mcp-outlook
    environment:
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      COPILOT_CLIENT_ID: ${COPILOT_CLIENT_ID}
      COPILOT_CLIENT_SECRET: ${COPILOT_CLIENT_SECRET}
      APP_URL: ${APP_URL}
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped
